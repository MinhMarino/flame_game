name: iOS Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

env:
  BUNDLE_ID: com.nguyenminh.flameGame

jobs:
  validate:
    name: Validate Flutter project
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build iOS release (no codesign)
        run: flutter build ios --release --no-codesign

  build-ipa:
    name: Build signed IPA
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Import Apple signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${BUILD_CERTIFICATE_BASE64:-}" ]; then
            echo "::error title=Missing signing secret::Add IOS_DISTRIBUTION_CERTIFICATE_BASE64 to GitHub Secrets. See README.md."
            exit 1
          fi
          if [ -z "${P12_PASSWORD:-}" ]; then
            echo "::error title=Missing signing secret::Add IOS_DISTRIBUTION_CERTIFICATE_PASSWORD to GitHub Secrets."
            exit 1
          fi
          if [ -z "${KEYCHAIN_PASSWORD:-}" ]; then
            echo "::error title=Missing signing secret::Add KEYCHAIN_PASSWORD to GitHub Secrets."
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          if [ -z "${IOS_PROVISIONING_PROFILE_BASE64:-}" ]; then
            echo "::error title=Missing signing secret::Add IOS_PROVISIONING_PROFILE_BASE64 to GitHub Secrets."
            exit 1
          fi

          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "Installed provisioning profile: $UUID"

      - name: Configure manual code signing
        env:
          IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          set -euo pipefail

          if [ -z "${IOS_DEVELOPMENT_TEAM:-}" ]; then
            echo "::error title=Missing signing secret::Add IOS_DEVELOPMENT_TEAM to GitHub Secrets."
            exit 1
          fi
          if [ -z "${IOS_PROVISIONING_PROFILE_NAME:-}" ]; then
            echo "::error title=Missing signing secret::Add IOS_PROVISIONING_PROFILE_NAME to GitHub Secrets."
            exit 1
          fi

          cat >> ios/Flutter/Release.xcconfig <<EOF
          DEVELOPMENT_TEAM=$IOS_DEVELOPMENT_TEAM
          PROVISIONING_PROFILE_SPECIFIER=$IOS_PROVISIONING_PROFILE_NAME
          CODE_SIGN_IDENTITY=Apple Distribution
          CODE_SIGN_STYLE=Manual
          EOF

      - name: Create ExportOptions.plist
        env:
          IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          IOS_EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD }}
        run: |
          set -euo pipefail

          EXPORT_METHOD="${IOS_EXPORT_METHOD:-ad-hoc}"

          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$EXPORT_METHOD</string>
            <key>teamID</key>
            <string>$IOS_DEVELOPMENT_TEAM</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.BUNDLE_ID }}</key>
              <string>$IOS_PROVISIONING_PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build signed IPA
        run: |
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist \
            --build-number="${{ github.run_number }}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: flame-game-ios-${{ github.run_number }}
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Upload dSYM artifact
        uses: actions/upload-artifact@v4
        with:
          name: flame-game-dsym-${{ github.run_number }}
          path: build/ios/archive/Runner.xcarchive/dSYMs
          if-no-files-found: ignore
